# =============================================================
# CI Pipeline — Developer-in-a-Day Demo
# Gates (all must pass before merge):
#   1. Static analysis (ESLint + CodeQL)
#   2. Secret scanning (GitHub Advanced Security native)
#   3. License validation
#   4. Unit tests with coverage threshold (>=80%)
#   5. Container build & hardening scan (Trivy + Grype)
#   6. SBOM generation + image signing (Sigstore keyless)
# =============================================================
name: CI — Build, Test & Security Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write
  issues: write

jobs:

  # ── JOB 1: Static Analysis ───────────────────────────────────
  static-analysis:
    name: Static Analysis — ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run ESLint (fail on warnings)
        run: npm run lint

      - name: Generate ESLint SARIF
        if: always()
        run: npm run lint:sarif
        continue-on-error: true

      - name: Upload ESLint SARIF to Security dashboard
        if: always() && hashFiles('eslint-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint-results.sarif
          category: eslint

  # ── JOB 2: CodeQL SAST ────────────────────────────────────────
  codeql:
    name: Security — CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}

  # ── JOB 3: License Validation ─────────────────────────────────
  license-check:
    name: License Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run license validation
        run: npm run license-check

      - name: Generate license report
        if: always()
        run: npx license-checker --json > license-report.json 2>/dev/null || true

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report-${{ github.run_number }}
          path: license-report.json
          retention-days: 90

  # ── JOB 4: Unit Tests + Coverage Gate ─────────────────────────
  test:
    name: Unit Tests — Coverage >=80%
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        run: npm test
        env:
          NODE_ENV: test

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            junit.xml
            jest-junit.xml
          retention-days: 90

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_number }}
          path: coverage/
          retention-days: 30

  # ── JOB 5: Container Build & Security Scan ────────────────────
  container-security:
    name: Container Build & Security Scan
    runs-on: ubuntu-latest
    needs: [static-analysis, test]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (with layer caching)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
          provenance: ${{ github.ref == 'refs/heads/main' }}
          sbom: ${{ github.ref == 'refs/heads/main' }}

      - name: Trivy — container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-container.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-container.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container

      - name: Trivy — generate SBOM (SPDX-JSON)
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output: sbom.spdx.json
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload SBOM artifact
        if: github.ref == 'refs/heads/main' && always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.run_number }}
          path: sbom.spdx.json
          retention-days: 365

      - name: Grype — second-opinion scan
        if: github.ref == 'refs/heads/main'
        uses: anchore/scan-action@v4
        id: grype
        with:
          image: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
          fail-build: false
          output-format: sarif
          severity-cutoff: high
        continue-on-error: true

      - name: Upload Grype SARIF
        if: github.ref == 'refs/heads/main' && steps.grype.conclusion == 'success' && steps.grype.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype

      - name: Install cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (Sigstore keyless)
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          echo "Image signed at $(date -u)"

  # ── JOB 6: All Gates Summary (required status check) ──────────
  all-gates-pass:
    name: All CI Gates Passed
    runs-on: ubuntu-latest
    needs: [static-analysis, codeql, license-check, test, container-security]
    if: always()
    steps:
      - name: Check all gate outcomes
        run: |
          echo "static-analysis:    ${{ needs.static-analysis.result }}"
          echo "codeql:             ${{ needs.codeql.result }}"
          echo "license-check:      ${{ needs.license-check.result }}"
          echo "test:               ${{ needs.test.result }}"
          echo "container-security: ${{ needs.container-security.result }}"

          if [[ "${{ needs.static-analysis.result }}" != "success" || \
                "${{ needs.codeql.result }}" != "success" || \
                "${{ needs.license-check.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.container-security.result }}" != "success" ]]; then
            echo "One or more required gates failed."
            exit 1
          fi
          echo "All required gates passed — PR is eligible for merge."
